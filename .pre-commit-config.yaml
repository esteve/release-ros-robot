# Pre-commit hooks for release-ros-robot
# See https://pre-commit.com for more information

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Check for trailing whitespace
        types: [text]
      - id: end-of-file-fixer
        name: Ensure files end with newline
        types: [text]
      - id: check-yaml
        name: Validate YAML files
        args: [--safe]
      - id: check-json
        name: Validate JSON files
      - id: check-added-large-files
        name: Prevent large files from being committed
        args: [--maxkb=500]
      - id: check-merge-conflict
        name: Check for merge conflict strings
      - id: check-case-conflict
        name: Check for case conflicts in filenames
      - id: mixed-line-ending
        name: Check for mixed line endings
        args: [--fix=lf]

  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
        name: Validate Python syntax
      - id: check-docstring-first
        name: Check docstring placement
      - id: debug-statements
        name: Check for debug statements

  # Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Format Python code with Black
        args: [--line-length=100]

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      - id: ruff
        name: Lint Python code with Ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type check Python code with mypy
        args: [--ignore-missing-imports, --python-version=3.10]
        files: ^scripts/

# Global settings
default_language_version:
  python: python3

# CI settings
ci:
  autofix_commit_msg: 'style: auto-fix pre-commit hooks'
  autofix_prs: true
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
