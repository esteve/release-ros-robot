name: 'Release ROS Robot'
description: 'Automate ROS package releases with bloom-release, using a release-please/release-plz-style workflow'
author: 'Esteve Fernandez'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  mode:
    description: 'Action mode: prepare (create release PR) or release (run bloom-release)'
    required: false
    default: 'release'
  oauth-token:
    description: >
      PAT for release mode. Falls back to the BLOOM_OAUTH_TOKEN environment variable.
      Not used in prepare mode (which uses GITHUB_TOKEN).
    required: false
  github-user:
    description: >
      GitHub username that owns the rosdistro fork used by bloom-release.
      Falls back to the BLOOM_GITHUB_USER environment variable.
      Only used in release mode.
    required: false
  repository:
    description: >
      Repository name as registered in rosdistro (e.g., my_ros_package).
      Overrides the config file in release mode.
    required: false
  release-repository:
    description: >
      Release repository URL (e.g., https://github.com/ros2-gbp/my_package-release.git).
      Overrides the config file in release mode.
    required: false
  targets:
    description: >
      YAML block string mapping branch names to sequential release targets.
      Each target entry must contain rosdistro and track. Overrides the config file in release mode.
    required: false
    default: ''
  config-file:
    description: >
      TOML config file path. Defaults to bloom-release.toml or .bloom-release.toml in the repository root. Direct action inputs override config values.
    required: false
    default: ''
  dry-run:
    description: 'Run in dry-run mode without actually releasing'
    required: false
    default: 'false'
  exclude-paths:
    description: >
      Newline-separated list of POSIX glob patterns to exclude from package.xml
      discovery. Useful when the repository contains test fixtures or vendored
      code with package.xml files that are not real ROS packages.
    required: false
    default: ''
  version-bump:
    description: 'Version bump type: auto (detect from conventional commits), patch, minor, or major'
    required: false
    default: 'auto'
  base-branch:
    description: 'Base branch for release PR (only used in prepare mode)'
    required: false
    default: 'main'

outputs:
  pr-created:
    description: 'Whether a release PR was created (prepare mode only)'
    value: ${{ steps.prepare-release.outputs.pr-created || 'false' }}
  released:
    description: 'Whether a release was performed (release mode only)'
    value: ${{ steps.bloom-release.outputs.released || 'false' }}
  version:
    description: 'The version that was released or will be released'
    value: ${{ steps.prepare-release.outputs.version || steps.bloom-release.outputs.version }}
  rosdistro:
    description: 'The ROS distribution that was released to (release mode only)'
    value: ${{ steps.bloom-release.outputs.rosdistro }}
  pr-url:
    description: 'The URL of the release PR (prepare mode) or rosdistro pull request (release mode)'
    value: ${{ steps.prepare-release.outputs.pr-url || steps.bloom-release.outputs.pr-url }}
  results-json:
    description: 'JSON array of per-target release results (release batch mode only)'
    value: ${{ steps.bloom-release.outputs.results-json }}

runs:
  using: 'composite'
  steps:
    - name: Set up mise and pixi
      uses: jdx/mise-action@v4
      with:
        working_directory: ${{ github.action_path }}

    - name: Install dependencies
      shell: bash
      run: pixi install --manifest-path "${{ github.action_path }}" --frozen

    - name: Initialize rosdep
      if: inputs.mode == 'release'
      shell: bash
      run: pixi run --manifest-path "${{ github.action_path }}" --frozen --environment action rosdep-init

    - name: Update rosdep
      if: inputs.mode == 'release'
      shell: bash
      run: pixi run --manifest-path "${{ github.action_path }}" --frozen --environment action rosdep-update

    - name: Configure Git
      shell: bash
      env:
        INPUT_OAUTH_TOKEN: ${{ inputs.oauth-token }}
        INPUT_GITHUB_USER: ${{ inputs.github-user }}
      run: |
        git config --global credential.helper store

        if [ "${{ inputs.mode }}" = "prepare" ]; then
          # prepare mode: authenticate with GITHUB_TOKEN only.
          if [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "::error::prepare mode requires GITHUB_TOKEN." \
                 "Add 'permissions: contents: write' to the job."
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials
        else
          # release mode: resolve credentials once; write to GITHUB_ENV for downstream steps.
          _TOKEN="${BLOOM_OAUTH_TOKEN:-${INPUT_OAUTH_TOKEN:-}}"
          _USER="${BLOOM_GITHUB_USER:-${INPUT_GITHUB_USER:-}}"
          if [ -z "${_TOKEN}" ]; then
            echo "::error::release mode requires BLOOM_OAUTH_TOKEN env var or oauth-token input."
            exit 1
          fi
          if [ -z "${_USER}" ]; then
            echo "::error::release mode requires BLOOM_GITHUB_USER env var or github-user input."
            exit 1
          fi

          echo "https://x-access-token:${_TOKEN}@github.com" > ~/.git-credentials

          export GH_TOKEN="${_TOKEN}"
          _LOGIN="$(gh api user --jq '.login')"
          _ID="$(gh api user --jq '.id')"

          if [ "${_LOGIN}" != "${_USER}" ]; then
            echo "::error::BLOOM_GITHUB_USER (${_USER}) does not match the PAT owner (${_LOGIN})."
            exit 1
          fi

          git config --global user.name "${_USER}"
          git config --global user.email "${_ID}+${_USER}@users.noreply.github.com"

          # Normalize resolved credentials for downstream release steps.
          echo "BLOOM_OAUTH_TOKEN=${_TOKEN}" >> "${GITHUB_ENV}"
          echo "BLOOM_GITHUB_USER=${_USER}" >> "${GITHUB_ENV}"
        fi

    - name: Configure Bloom
      if: inputs.mode == 'release'
      shell: bash
      run: |
        mkdir -p ~/.config
        cat > ~/.config/bloom <<EOF
        {
          "github_user": "${BLOOM_GITHUB_USER}",
          "oauth_token": "${BLOOM_OAUTH_TOKEN}"
        }
        EOF

    - name: Ensure rosdistro fork exists
      if: inputs.mode == 'release'
      shell: bash
      run: |
        export GH_TOKEN="${BLOOM_OAUTH_TOKEN}"

        if gh api "repos/${BLOOM_GITHUB_USER}/rosdistro" --silent >/dev/null 2>&1; then
          echo "Found existing rosdistro fork at ${BLOOM_GITHUB_USER}/rosdistro"
          exit 0
        fi

        echo "rosdistro fork not found for ${BLOOM_GITHUB_USER}; creating it now"
        gh repo fork ros/rosdistro --remote=false >/dev/null 2>&1 || true

        _attempt=1
        _max_attempts=12
        while [ "${_attempt}" -le "${_max_attempts}" ]; do
          if gh api "repos/${BLOOM_GITHUB_USER}/rosdistro" --silent >/dev/null 2>&1; then
            echo "rosdistro fork is ready at ${BLOOM_GITHUB_USER}/rosdistro"
            exit 0
          fi

          echo "Waiting for rosdistro fork creation to complete (attempt ${_attempt}/${_max_attempts})"
          sleep 5
          _attempt=$((_attempt + 1))
        done

        echo "::error::Could not find or create ${BLOOM_GITHUB_USER}/rosdistro. Ensure BLOOM_GITHUB_USER owns the PAT and can fork ros/rosdistro."
        exit 1

    - name: Prepare Release PR
      if: inputs.mode == 'prepare'
      id: prepare-release
      shell: bash
      env:
        BLOOM_EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
      run: |
        export GH_TOKEN="${GITHUB_TOKEN}"
        ARGS=(--config-file "${{ inputs.config-file }}")
        if [ -n "${{ inputs.version-bump }}" ]; then
          ARGS+=(--version-bump "${{ inputs.version-bump }}")
        fi
        if [ -n "${{ inputs.base-branch }}" ]; then
          ARGS+=(--base-branch "${{ inputs.base-branch }}")
        fi
        pixi run --manifest-path "${{ github.action_path }}" \
          python "${{ github.action_path }}/scripts/prepare_release.py" "${ARGS[@]}"

    - name: Run Bloom Release
      if: inputs.mode == 'release'
      id: bloom-release
      shell: bash
      env:
        BLOOM_EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        INPUT_TARGETS: ${{ inputs.targets }}
      run: |
        export GH_TOKEN="${BLOOM_OAUTH_TOKEN}"
        ARGS=(
          --config-file "${{ inputs.config-file }}"
          --repository "${{ inputs.repository }}"
          --release-repository "${{ inputs.release-repository }}"
          --current-branch "${{ github.ref_name }}"
          --targets "${INPUT_TARGETS}"
        )
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          ARGS+=(--dry-run)
        fi
        pixi run --manifest-path "${{ github.action_path }}" \
          --environment action \
          python "${{ github.action_path }}/scripts/execute_release.py" "${ARGS[@]}"
